name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      runtime_version: ${{ steps.versions.outputs.runtime }}
      base_os_version: ${{ steps.versions.outputs.base_os }}
      base_conda_version: ${{ steps.versions.outputs.base_conda }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract versions
        id: versions
        run: |
          for key in runtime base_os base_conda python jupyterlab; do
            val=$(awk -F': *' -v k="$key" '$1==k {gsub(/"/,"",$2); print $2}' versions.yaml)
            if [ -z "$val" ]; then
              echo "::error::Missing key '$key' in versions.yaml"
              exit 1
            fi
            echo "${key}=${val}" >> "$GITHUB_OUTPUT"
            echo "$key=$val"
          done

  build-and-test:
    needs: validate
    runs-on: ubuntu-latest
    env:
      BUILD_CACHE_PATH: .buildx-cache
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image-cache=true

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_CACHE_PATH }}
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build base-os
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base-os/Dockerfile
          tags: |
            jupyter-extended-base-os:${{ needs.validate.outputs.base_os_version }}
            jupyter-extended-base-os:stable
          cache-from: type=local,src=${{ env.BUILD_CACHE_PATH }}/base-os
          cache-to: type=local,dest=${{ env.BUILD_CACHE_PATH }}/base-os-new,mode=max

      - name: Move base-os cache
        run: |
          rm -rf ${{ env.BUILD_CACHE_PATH }}/base-os
          mv ${{ env.BUILD_CACHE_PATH }}/base-os-new ${{ env.BUILD_CACHE_PATH }}/base-os

      - name: Build base-conda
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base-conda/Dockerfile
          build-args: |
            BASE_OS_IMAGE=jupyter-extended-base-os:${{ needs.validate.outputs.base_os_version }}
          tags: |
            jupyter-extended-base-conda:${{ needs.validate.outputs.base_conda_version }}
            jupyter-extended-base-conda:stable
          cache-from: type=local,src=${{ env.BUILD_CACHE_PATH }}/base-conda
          cache-to: type=local,dest=${{ env.BUILD_CACHE_PATH }}/base-conda-new,mode=max

      - name: Move base-conda cache
        run: |
          rm -rf ${{ env.BUILD_CACHE_PATH }}/base-conda
          mv ${{ env.BUILD_CACHE_PATH }}/base-conda-new ${{ env.BUILD_CACHE_PATH }}/base-conda

      - name: Build runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runtime/Dockerfile
          build-args: |
            BASE_CONDA_IMAGE=jupyter-extended-base-conda:${{ needs.validate.outputs.base_conda_version }}
          tags: |
            jupyter-extended:${{ needs.validate.outputs.runtime_version }}
            jupyter-extended:latest
          cache-from: type=local,src=${{ env.BUILD_CACHE_PATH }}/runtime
          cache-to: type=local,dest=${{ env.BUILD_CACHE_PATH }}/runtime-new,mode=max

      - name: Move runtime cache
        run: |
          rm -rf ${{ env.BUILD_CACHE_PATH }}/runtime
          mv ${{ env.BUILD_CACHE_PATH }}/runtime-new ${{ env.BUILD_CACHE_PATH }}/runtime

      - name: Run smoke tests
        run: make test
